---
# Template created with Packer or manually
# Used only to create project templates from
base_vm_template: BASE_TEMPLATE_ubuntu2604

# vCenter Template name
vm_template: catapult-template-ubuntu2604

# AWS EC2 Image using owner ID & string lookup because machine IDs are different between regions
ami_owner_id: "099720109477"
ami_name_search_string: ubuntu/images/hvm-ssd-gp3/ubuntu-resolute*
aws_vm_size: t3.small

# Linode Image curl https://api.linode.com/v4/images | jq
linode_image: linode/ubuntu26.04

# Azure
azure_vm_size: Standard_D2s_v3 # Recommended by vendor
azure_vm_image:
  offer: ubuntu-26_04-lts
  publisher: canonical
  sku: server-gen1
  version: latest

# Google Cloud
google_cloud_machine_type: e2-medium # Default when creating manually
google_cloud_vm_image: # Values used to lookup the latest image name for the OS
  path: projects/ubuntu-os-cloud/global/images
  name: ubuntu-2604-resolute-amd64
  project: ubuntu-os-cloud
