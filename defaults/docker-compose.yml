---
name: ${MAKEVAR_CONTAINER_PROJECT_NAME}
services:
  catapult:
    tty: true
    image: ${MAKEVAR_IMAGE_FULL}
    container_name: ${MAKEVAR_CONTAINER_NAME}
    hostname: ${MAKEVAR_CONTAINER_NAME}
    network_mode: host
    restart: no
    pids_limit: 4096
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc: 65535
    tmpfs:
      - /tmp
      - /var/tmp
    volumes:
      - ${MAKEVAR_HOST_USER_HOME}/.gitconfig:/home/builder/.gitconfig
      - ${MAKEVAR_ROOT_DIR}/container/home/builder/.zshrc:/home/builder/.zshrc
      - ${MAKEVAR_ROOT_DIR}/container/home/builder/.vault:/home/builder/.vault
      - ${MAKEVAR_ROOT_DIR}/container/home/builder/.ssh/:/home/builder/.ssh/
      - ${MAKEVAR_ROOT_DIR}/container/home/builder/.history:/home/builder/.history
      - ${MAKEVAR_ROOT_DIR}/:/srv/
      - ${MAKEVAR_HOST_SSH_AUTH_SOCK}:/ssh-agent
    environment:
      ALLOW_HOST_SSH_ACCESS: ${MAKEVAR_ALLOW_HOST_SSH_ACCESS}
      CATAPULT: 1 # This is used to check if the deployment is running in a Catapult container
      MAKEVAR_ARA_ENABLE: ${MAKEVAR_ARA_ENABLE}
      MAKEVAR_AUTO_UPDATE: ${MAKEVAR_AUTO_UPDATE}
      MAKEVAR_CATAPULT_VERSION: ${MAKEVAR_CATAPULT_VERSION}
      MAKEVAR_FREEZE_UPDATE: ${MAKEVAR_FREEZE_UPDATE}
      MAKEVAR_HOST_OS: ${MAKEVAR_HOST_OS}
      MAKEVAR_HOST_USERNAME: ${MAKEVAR_HOST_USERNAME}
      MAKEVAR_NOVA_CORE_VERSION: ${MAKEVAR_NOVA_CORE_VERSION}
      SLACK_CHANNEL: ${MAKEVAR_WEBHOOK_CHANNEL}
      SLACK_USERNAME: ${MAKEVAR_WEBHOOK_USERNAME}
      SLACK_WEBHOOK_URL: ${MAKEVAR_WEBHOOK_URL}
      SSH_AUTH_SOCK: /ssh-agent
      TZ: ${MAKEVAR_TZ}
      USER: ${MAKEVAR_HOST_USERNAME}

      # ARA Settings (If ARA is enabled)
      MAKEVAR_ARA_RECORD_CONTROLLER_NAME: ${MAKEVAR_ARA_RECORD_CONTROLLER_NAME}
      MAKEVAR_ARA_RECORD_USERNAME: ${MAKEVAR_ARA_RECORD_USERNAME}
      ARA_CALLBACK_THREADS: 4
      ARA_API_CLIENT: http
      ARA_API_SERVER: http://127.0.0.1:8000
      ARA_RECORD_TASK_CONTENT: false

      # Python optimizations
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "UTF-8"

    extra_hosts:
      - host.docker.internal:host-gateway
      - ${MAKEVAR_CONTAINER_NAME}:127.0.1.1
    logging:
      driver: json-file
      options:
        max-size: 250m
        max-file: "1"
